name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v1.2.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build XPI
        run: bash build.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: builds/breeze.xpi
          generate_release_notes: true
